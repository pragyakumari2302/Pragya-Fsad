# Server Configuration
server.port=${PORT:9090}

# Database Configuration
# Uses DATABASE_URL env var on Render (PostgreSQL), falls back to MySQL locally
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pragya?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Amit@0602}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

# JWT Configuration
jwt.secret=${JWT_SECRET:PathWiseCareerGuidancePlatformSecretKey2024VerySecureAndLongEnoughForHS512Algorithm}
jwt.expiration=86400000

# CORS Configuration - allow Vercel + local dev
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.pathwise=DEBUG

# Disable Spring Boot DevTools automatic restart when running the packaged app
spring.devtools.restart.enabled=false
